{% extends "base.html" %}

{% block content %}

<h2 class="section-title">📞 Contact Us</h2>

<div class="row justify-content-center">
<div class="col-md-7">

<div class="card p-4">

{% if error %}
<div class="alert alert-danger text-center">{{ error }}</div>
{% endif %}

{% if success %}
<div class="alert alert-success text-center">{{ success }}</div>
{% endif %}

<form method="POST">

<input class="form-control mb-3" name="name" placeholder="👤 Your Name" required>

<input class="form-control mb-3" name="email" type="email" placeholder="📧 Your Email" required>

<textarea class="form-control mb-3" name="message" rows="4" placeholder="💬 Your Message" required></textarea>

<div class="mb-3">
<label>Solve: {{ num1 }} + {{ num2 }}</label>
<input class="form-control" name="captcha" placeholder="Answer here" required>
</div>

<button class="btn btn-custom w-100">Send Message</button>

</form>

</div>
</div>
</div>

{% endblock %}
